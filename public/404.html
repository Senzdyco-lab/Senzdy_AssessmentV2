<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Senzdy</title>
  <script>
    // GitHub Pages SPA fallback (https://github.com/rafgraph/spa-github-pages).
    // Encodes the requested path into a query string and redirects to the
    // app's index.html, where a decoder restores the URL before React Router
    // hydrates. pathSegmentsToKeep = 1 because the app is hosted under
    // /Senzdy_AssessmentV2/.
    var pathSegmentsToKeep = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
