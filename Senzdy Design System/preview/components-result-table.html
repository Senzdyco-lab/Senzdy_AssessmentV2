<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:#fff; font-family:var(--font-sans); }
  table { border-collapse: collapse; width: 100%; font-size: 13px; }
  th, td { border: 1px solid #e8e8e8; padding: 10px 12px; text-align: left; }
  th { background: #fafafa; color: var(--fg-2); font-weight: 600; font-size:12px; text-transform:uppercase; letter-spacing:.04em; }
  td.system { font-weight: 600; color: var(--senzdy-purple-800); }
  td.result { font-weight:600; }
  .dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; vertical-align: middle; }
</style></head><body>
<table>
  <thead><tr><th>System</th><th><span class="dot" style="background:var(--series-preferences)"></span>Preferences</th><th><span class="dot" style="background:var(--series-arousals)"></span>Arousals</th><th>Result</th></tr></thead>
  <tbody>
    <tr><td class="system">Sight</td><td>35%</td><td>65%</td><td class="result">Passion</td></tr>
    <tr><td class="system">Auditory</td><td>35%</td><td>65%</td><td class="result">Passion</td></tr>
    <tr><td class="system">Olfactory & Gustation</td><td>25%</td><td>45%</td><td class="result">Relaxation</td></tr>
    <tr><td class="system">Touch</td><td>60%</td><td>25%</td><td class="result">Relaxation</td></tr>
  </tbody>
</table>
</body></html>
