<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:#fff; font-family:var(--font-sans); }
  .row { display:grid; grid-template-columns: repeat(3, 1fr); gap:8px; }
  .cell { padding:14px 12px; border-radius:6px; border:1px solid #00000010;
          font-size:13px; font-weight:600; color:#3a2a4a; line-height:1.2; }
  .cell .label { display:block; font-size:10px; opacity:.65; font-weight:500; letter-spacing:.06em; text-transform:uppercase; margin-bottom:4px; }
</style></head><body>
<div class="row">
  <div class="cell" style="background:var(--band-flow)"><span class="label">HH-HH</span>Flow</div>
  <div class="cell" style="background:var(--band-passion)"><span class="label">HH-MH</span>Passion</div>
  <div class="cell" style="background:var(--band-anxiety)"><span class="label">HH-LL</span>Anxiety</div>
  <div class="cell" style="background:var(--band-control)"><span class="label">MH-HH</span>Control</div>
  <div class="cell" style="background:var(--band-relax)"><span class="label">MH-MH</span>Relaxation</div>
  <div class="cell" style="background:var(--band-worry)"><span class="label">MH-LH</span>Worry</div>
  <div class="cell" style="background:var(--band-seeker)"><span class="label">LH-HH</span>Seeker</div>
  <div class="cell" style="background:var(--band-boredom)"><span class="label">LH-MH</span>Boredom</div>
  <div class="cell" style="background:var(--band-apathy)"><span class="label">LH-LL</span>Apathy</div>
</div>
</body></html>
