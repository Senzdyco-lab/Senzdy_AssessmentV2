<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:16px; background:#fff; font-family:var(--font-sans); display:flex; align-items:center; justify-content:center; }
  svg { max-width: 100%; height: auto; }
  .lg { display:flex; gap:24px; justify-content:center; margin-top:8px; font-size:13px; color:var(--fg-1); }
  .dot { display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:6px; vertical-align:middle; }
  .wrap{ display:flex; flex-direction:column; align-items:center; }
</style></head><body>
<div class="wrap">
<svg viewBox="-160 -160 320 320" width="280" height="280">
  <defs><style>
    .axis { stroke:#d6d6d6; stroke-width:.7; fill:none; }
    .lab  { fill:#7a7a7a; font-size:9px; font-family: var(--font-sans); }
    .pref { fill: #1daf00; fill-opacity:.18; stroke:#1daf00; stroke-width:1.5; }
    .arou { fill: #b61a1a; fill-opacity:.18; stroke:#b61a1a; stroke-width:1.5; }
    .pt-p { fill:#1daf00; }
    .pt-a { fill:#b61a1a; }
  </style></defs>
  <!-- 5 concentric hex rings -->
  <g class="axis">
    <polygon points="120,0 60,-103.9 -60,-103.9 -120,0 -60,103.9 60,103.9"/>
    <polygon points="96,0 48,-83.1 -48,-83.1 -96,0 -48,83.1 48,83.1"/>
    <polygon points="72,0 36,-62.4 -36,-62.4 -72,0 -36,62.4 36,62.4"/>
    <polygon points="48,0 24,-41.6 -24,-41.6 -48,0 -24,41.6 24,41.6"/>
    <polygon points="24,0 12,-20.8 -12,-20.8 -24,0 -12,20.8 12,20.8"/>
    <line x1="0" y1="0" x2="120" y2="0"/>
    <line x1="0" y1="0" x2="60" y2="-103.9"/>
    <line x1="0" y1="0" x2="-60" y2="-103.9"/>
    <line x1="0" y1="0" x2="-120" y2="0"/>
    <line x1="0" y1="0" x2="-60" y2="103.9"/>
    <line x1="0" y1="0" x2="60" y2="103.9"/>
  </g>
  <!-- arousals 65,65,45,25,35,75 polygon (sight, audit, olf, touch, vest, prop) angles 0,-60,-120,180,120,60 from top-axis offset -->
  <polygon class="arou" points="78,0 46.8,-81.0 -32.4,-56.1 -30,0 -42,72.7 90,52.0"/>
  <polygon class="pref" points="42,0 25.2,-43.6 -18,-31.2 -72,0 -30,52.0 66,38.1"/>
  <!-- labels -->
  <text class="lab" x="125" y="3" text-anchor="start">Sight</text>
  <text class="lab" x="65" y="-110" text-anchor="middle">Auditory</text>
  <text class="lab" x="-65" y="-110" text-anchor="middle">Olfactory</text>
  <text class="lab" x="-125" y="3" text-anchor="end">Touch</text>
  <text class="lab" x="-65" y="115" text-anchor="middle">Vestibular</text>
  <text class="lab" x="65" y="115" text-anchor="middle">Proprioceptive</text>
</svg>
<div class="lg">
  <span><span class="dot" style="background:#1daf00"></span>Preferences</span>
  <span><span class="dot" style="background:#b61a1a"></span>Arousals</span>
</div>
</div>
</body></html>
