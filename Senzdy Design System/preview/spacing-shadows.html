<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:#fff; font-family:var(--font-sans); display:flex; flex-direction:column; gap:12px; }
  .row { display:flex; align-items:center; gap:14px; }
  .swatch { width:80px; height:48px; border-radius:6px; box-shadow: var(--shadow-button); background: var(--senzdy-purple-700); }
  .meta { font-size:12px; color:var(--fg-2); font-family: ui-monospace, monospace; }
  .name { font-weight:700; font-size:13px; color:var(--fg-1); margin-bottom:2px; }
  .row2 .swatch { box-shadow: var(--shadow-card); background:#fff; border:1px solid #eee; }
  .row3 .swatch { box-shadow: var(--shadow-pop); background:#fff; border:1px solid #eee; }
</style></head><body>
<div class="row"><div class="swatch"></div><div><div class="name">--shadow-button</div><div class="meta">0 16px 30px rgba(23,31,114,.20)</div></div></div>
<div class="row row2"><div class="swatch"></div><div><div class="name">--shadow-card</div><div class="meta">0 2px 8px rgba(23,31,114,.06)</div></div></div>
<div class="row row3"><div class="swatch"></div><div><div class="name">--shadow-pop</div><div class="meta">0 12px 32px rgba(23,31,114,.16)</div></div></div>
</body></html>
