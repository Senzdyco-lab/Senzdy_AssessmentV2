<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:#fff; font-family:var(--font-sans); }
  .grid { display:grid; grid-template-columns: repeat(4, 1fr); gap:14px; }
  .item { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .b { background: var(--senzdy-purple-700); }
  .lbl { font-size:11px; font-family:ui-monospace,monospace; color:var(--fg-3); text-transform:uppercase; }
</style></head><body>
<div class="grid">
  <div class="item"><div class="b" style="width:48px;height:48px;border-radius:0"></div><div class="lbl">0 · square</div></div>
  <div class="item"><div class="b" style="width:48px;height:48px;border-radius:4px"></div><div class="lbl">4 · button/input</div></div>
  <div class="item"><div class="b" style="width:48px;height:48px;border-radius:8px"></div><div class="lbl">8 · default card</div></div>
  <div class="item"><div class="b" style="width:48px;height:48px;border-radius:16px"></div><div class="lbl">16 · result card</div></div>
</div>
</body></html>
