<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#fff; font-family:var(--font-sans); display:flex; gap:32px; align-items:center; justify-content:center; }
  .wrap { display:flex; align-items:flex-end; gap:14px; }
  .step { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .bar { width:24px; background: var(--senzdy-purple-600); border-radius:2px; }
  .lbl { font-size:10px; font-family:ui-monospace,monospace; color:var(--fg-3); }
</style></head><body>
<div class="wrap">
  <div class="step"><div class="bar" style="height:4px"></div><div class="lbl">4</div></div>
  <div class="step"><div class="bar" style="height:8px"></div><div class="lbl">8</div></div>
  <div class="step"><div class="bar" style="height:12px"></div><div class="lbl">12</div></div>
  <div class="step"><div class="bar" style="height:16px"></div><div class="lbl">16</div></div>
  <div class="step"><div class="bar" style="height:24px"></div><div class="lbl">24</div></div>
  <div class="step"><div class="bar" style="height:32px"></div><div class="lbl">32</div></div>
  <div class="step"><div class="bar" style="height:48px"></div><div class="lbl">48</div></div>
  <div class="step"><div class="bar" style="height:64px"></div><div class="lbl">64</div></div>
  <div class="step"><div class="bar" style="height:96px"></div><div class="lbl">96</div></div>
</div>
</body></html>
