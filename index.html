      rel="stylesheet"

    <script>
      // GitHub Pages SPA fallback decoder — pairs with public/404.html.
      // Decodes the path that 404.html stashed in the query string and
      // restores it before React Router boots, so deep links like
      // /Senzdy_AssessmentV2/result work after a hard refresh.
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })(window.location);
    </script>
